<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Idle - Retro Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-size: 4px;
            --bg-color: #74c0fc;
            --panel-color: #f8f9fa;
            --pkmn-red: #ff0000;
        }

        body {
            font-family: 'Press+Start+2P', cursive;
            background-color: #2c3e50;
            color: #333;
            user-select: none;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: var(--bg-color);
            border: 8px solid #000;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 0 #1a252f;
        }

        /* Top Stats Bar */
        .top-stats-bar {
            background: #fbc531;
            padding: 10px 15px;
            border-bottom: 6px solid #000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 11px;
            line-height: 1.4;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
        }

        .pc-badge-container {
            position: relative;
            cursor: pointer;
        }

        .pc-badge {
            background: #fff;
            padding: 4px 8px;
            border: 3px solid #000;
            color: #d35400;
            font-weight: bold;
        }

        /* Tooltip de Mejoras */
        .upgrades-tooltip {
            position: absolute;
            top: 100%;
            right: 0;
            background: #fff;
            border: 3px solid #000;
            padding: 10px;
            width: 180px;
            z-index: 150;
            font-size: 9px;
            display: none;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            pointer-events: none;
            margin-top: 5px;
        }

        .pc-badge-container:hover .upgrades-tooltip,
        .pc-badge-container:active .upgrades-tooltip {
            display: block;
        }

        .route-header {
            background: #fff;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            border-bottom: 4px solid #000;
        }

        .battle-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(#74c0fc 60%, #91d18b 60%);
        }

        .creature {
            cursor: pointer;
            transition: transform 0.1s;
            image-rendering: pixelated;
        }

        .creature:active {
            transform: scale(0.9);
        }

        .hp-bar-container {
            width: 200px;
            height: 16px;
            background: #333;
            border: 4px solid #000;
            margin-bottom: 20px;
            position: relative;
        }

        .hp-bar-fill {
            height: 100%;
            background: #4cd137;
            width: 100%;
            transition: width 0.1s;
        }

        /* Bottom Action Panel */
        .action-panel {
            background: #f1c40f;
            padding: 15px;
            border-top: 6px solid #000;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: #fff;
            border: 4px solid #000;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            box-shadow: 0px 0px 0 rgba(0, 0, 0, 0.1);
            transform: translate(2px, 2px);
        }

        /* Overlay Menus */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay-header {
            color: white;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .overlay-content {
            background: #fff;
            border: 6px solid #000;
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Bestiary Styles */
        #bestiary-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .bestiary-entry {
            border: 3px solid #ccc;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 8px;
            text-align: center;
            padding: 4px;
        }

        .bestiary-entry.caught {
            border-color: #fbc531;
            background: #fff9e6;
        }

        /* Routes List Styles */
        .route-item {
            border: 4px solid #000;
            margin-bottom: 10px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }

        .route-item.locked {
            background: #ecf0f1;
            color: #95a5a6;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .route-item.current {
            border-color: #3498db;
            background: #ebf5fb;
        }

        /* Shop Styles */
        .shop-item {
            border: 4px solid #000;
            margin-bottom: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .shop-btn {
            background: #4cd137;
            border: 3px solid #000;
            padding: 8px;
            font-size: 10px;
            cursor: pointer;
            text-align: center;
        }

        .shop-btn.disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* Visual Effects */
        .floating-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            font-size: 16px;
            z-index: 60;
            text-shadow: 2px 2px 0 #000;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-60px);
                opacity: 0;
            }
        }

        .notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 6px solid black;
            padding: 15px;
            z-index: 50;
            display: none;
            text-align: center;
            font-size: 12px;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
            width: 80%;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <!-- Top Stats Bar -->
        <div class="top-stats-bar">
            <div class="stat-row">
                <span>CLIC: <span id="stat-dpc">1</span></span>
                <span>AUTO: <span id="stat-dps">0</span></span>
            </div>
            <div class="stat-row" style="align-items: center;">
                <span>CAPT: <span id="stat-caught">0/12</span></span>
                <div class="pc-badge-container">
                    <div class="pc-badge">PC: <span id="stat-pc">0</span></div>
                    <div class="upgrades-tooltip" id="upgrades-tooltip">
                        <div
                            style="border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 5px; color: #d35400;">
                            NIVELES:</div>
                        <div>GARRAS: Lvl <span id="lvl-dpc">0</span></div>
                        <div style="margin-top: 5px;">ALIADOS: Lvl <span id="lvl-dps">0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Route Info -->
        <div class="route-header">
            <div id="route-name">RUTA 1: PRADERA VERDE</div>
            <div id="route-progress" style="margin-top: 5px; color: #666; font-size: 10px;">DERROTADOS: 0 / 10</div>
        </div>

        <!-- Battle Area -->
        <div class="battle-area" id="battle-area">
            <div id="creature-name" style="margin-bottom: 12px; font-size: 18px; text-shadow: 1px 1px 0 #fff;">???</div>
            <div class="hp-bar-container">
                <div id="hp-fill" class="hp-bar-fill"></div>
            </div>

            <div id="creature-sprite-container"></div>

            <div id="game-notification" class="notification"></div>
        </div>

        <!-- Bottom Action Panel -->
        <div class="action-panel">
            <div class="btn" onclick="toggleOverlay('bestiary')">BESTIARIO</div>
            <div class="btn" onclick="toggleOverlay('shop')">MEJORAS</div>
            <div class="btn" id="next-route-btn" style="opacity: 0.4; pointer-events: none;" onclick="nextRoute()">SIG.
                RUTA</div>
            <div class="btn" onclick="toggleOverlay('map')">RUTAS</div>
        </div>

        <!-- Overlays (Bestiary, Map, Shop) -->
        <div id="bestiary" class="overlay">
            <div class="overlay-header">
                <span>BESTIARIO</span>
                <span onclick="toggleOverlay('bestiary')" style="cursor: pointer; color: #ff7675;">[X]</span>
            </div>
            <div class="overlay-content" id="bestiary-list"></div>
        </div>

        <div id="map" class="overlay">
            <div class="overlay-header">
                <span>MAPA DE RUTAS</span>
                <span onclick="toggleOverlay('map')" style="cursor: pointer; color: #ff7675;">[X]</span>
            </div>
            <div class="overlay-content" id="routes-list"></div>
        </div>

        <div id="shop" class="overlay">
            <div class="overlay-header">
                <span>MEJORAS (PC)</span>
                <span onclick="toggleOverlay('shop')" style="cursor: pointer; color: #ff7675;">[X]</span>
            </div>
            <div class="overlay-content">
                <div class="shop-item">
                    <div style="font-size: 10px;">AFILAR GARRA (+1 DPC)</div>
                    <div id="shop-dpc-cost" style="font-size: 9px; color: #d35400;">Coste: 10 PC</div>
                    <div class="shop-btn" id="btn-buy-dpc" onclick="buyUpgrade('dpc')">COMPRAR</div>
                </div>
                <div class="shop-item">
                    <div style="font-size: 10px;">ALIADO VELOZ (+2 DPS)</div>
                    <div id="shop-dps-cost" style="font-size: 9px; color: #d35400;">Coste: 25 PC</div>
                    <div class="shop-btn" id="btn-buy-dps" onclick="buyUpgrade('dps')">COMPRAR</div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <div class="btn" onclick="resetGame()"
                        style="background: #ff7675; color: white; display: inline-block; padding: 5px 10px; font-size: 8px;">
                        BORRAR PARTIDA</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración Inicial
        const routes = [
            { id: 1, name: "Pradera Verde", hpRange: [10, 25] },
            { id: 2, name: "Bosque Oscuro", hpRange: [60, 120] },
            { id: 3, name: "Cueva Rocosa", hpRange: [250, 500] },
            { id: 4, name: "Volcán Ardiente", hpRange: [1000, 2000] }
        ];

        const allCreatures = [
            { id: 1, name: "Bulby", color: "#4cd137", route: 1 },
            { id: 2, name: "Leafy", color: "#44bd32", route: 1 },
            { id: 3, name: "Seedler", color: "#10ac84", route: 1 },
            { id: 4, name: "Spido", color: "#7f8c8d", route: 2 },
            { id: 5, name: "Nighty", color: "#2c3e50", route: 2 },
            { id: 6, name: "Shadow", color: "#2d3436", route: 2 },
            { id: 7, name: "Stony", color: "#95a5a6", route: 3 },
            { id: 8, name: "Crag", color: "#7f8c8d", route: 3 },
            { id: 9, name: "Gravel", color: "#bdc3c7", route: 3 },
            { id: 10, name: "Firy", color: "#e67e22", route: 4 },
            { id: 11, name: "Magmu", color: "#d35400", route: 4 },
            { id: 12, name: "Blaze", color: "#c0392b", route: 4 }
        ];

        // Estado del Juego
        let state = {
            route: 1,
            maxUnlockedRoute: 1,
            defeatedPerRoute: { 1: 0, 2: 0, 3: 0, 4: 0 },
            requiredToAdvance: 10,
            dpc: 1,
            dps: 0,
            pc: 0,
            caughtIds: [],
            upgrades: { dpc: 0, dps: 0 }
        };

        let currentCreature = null;

        // Persistencia
        function saveGame() {
            localStorage.setItem('pocketIdleSave', JSON.stringify({
                ...state,
                caughtIds: Array.from(state.caughtIds)
            }));
        }

        function loadGame() {
            const saved = localStorage.getItem('pocketIdleSave');
            if (saved) {
                const data = JSON.parse(saved);
                state = { ...state, ...data };
                state.caughtIds = new Set(data.caughtIds);
                if (!state.defeatedPerRoute) {
                    state.defeatedPerRoute = { 1: 0, 2: 0, 3: 0, 4: 0 };
                }
            } else {
                state.caughtIds = new Set();
            }
        }

        function resetGame() {
            if (confirm("¿Estás segura de querer borrar todo el progreso, Amaya?")) {
                localStorage.removeItem('pocketIdleSave');
                location.reload();
            }
        }

        // Lógica de Batalla
        function spawnCreature() {
            const routeData = routes[state.route - 1];
            const possibleCreatures = allCreatures.filter(c => c.route === state.route);
            const base = possibleCreatures[Math.floor(Math.random() * possibleCreatures.length)];

            const hp = Math.floor(Math.random() * (routeData.hpRange[1] - routeData.hpRange[0] + 1)) + routeData.hpRange[0];

            currentCreature = {
                ...base,
                maxHp: hp,
                currentHp: hp
            };

            document.getElementById('creature-name').innerText = currentCreature.name.toUpperCase();
            document.getElementById('creature-sprite-container').innerHTML = createSVG(currentCreature.color);
            updateHPBar();
            checkNextRouteButton();
        }

        function createSVG(color) {
            return `
            <svg width="160" height="160" viewBox="0 0 10 10" class="creature" onclick="dealDamage(event, 'click')">
                <rect x="2" y="3" width="6" height="6" fill="${color}" />
                <rect x="3" y="2" width="4" height="1" fill="${color}" />
                <rect x="2" y="4" width="1" height="1" fill="white" />
                <rect x="7" y="4" width="1" height="1" fill="white" />
                <rect x="3" y="7" width="4" height="1" fill="rgba(0,0,0,0.2)" />
            </svg>
        `;
        }

        function dealDamage(event, type) {
            if (!currentCreature) return;
            const dmg = type === 'click' ? state.dpc : state.dps;
            if (dmg <= 0) return;

            currentCreature.currentHp -= dmg;

            if (type === 'click' && event) {
                showFloatingText(event.clientX, event.clientY, `-${dmg}`, '#ff4757');
            } else if (type === 'auto') {
                const sprite = document.querySelector('.creature');
                if (sprite) {
                    const rect = sprite.getBoundingClientRect();
                    showFloatingText(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height, `-${dmg}`, '#ffa502');
                }
            }

            if (currentCreature.currentHp <= 0) {
                onDefeat();
            } else {
                updateHPBar();
            }
        }

        function onDefeat() {
            const isNew = !state.caughtIds.has(currentCreature.id);

            if (isNew) {
                state.caughtIds.add(currentCreature.id);
                state.dpc += 1;
                state.dps += 2;
                showNotification(`¡${currentCreature.name} CAPTURADO!\nDPC +1 | DPS +2`);
            } else {
                // Recompensa escalada por ruta: Ruta 1 = 1PC, Ruta 2 = 2PC, etc.
                const pcReward = state.route;
                state.pc += pcReward;
                showNotification(`¡${currentCreature.name} DERROTADO!\n+${pcReward} PC (Escalado)`);
            }

            state.defeatedPerRoute[state.route]++;
            updateUI();
            saveGame();
            spawnCreature();
        }

        // Navegación
        function checkNextRouteButton() {
            const btn = document.getElementById('next-route-btn');
            const defeatedInCurrent = state.defeatedPerRoute[state.route] || 0;

            if (defeatedInCurrent >= state.requiredToAdvance && state.route === state.maxUnlockedRoute && state.route < routes.length) {
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            } else {
                btn.style.opacity = "0.4";
                btn.style.pointerEvents = "none";
            }
        }

        function changeRoute(routeId) {
            if (routeId > state.maxUnlockedRoute) return;
            state.route = routeId;
            toggleOverlay('map');
            updateUI();
            saveGame();
            spawnCreature();
        }

        function nextRoute() {
            if (state.route === state.maxUnlockedRoute && state.route < routes.length) {
                state.maxUnlockedRoute++;
                state.route++;
                updateUI();
                saveGame();
                spawnCreature();
            }
        }

        // Mejoras
        function getUpgradeCost(type) {
            const count = state.upgrades[type];
            if (type === 'dpc') return 10 + (count * 15);
            if (type === 'dps') return 25 + (count * 30);
        }

        function buyUpgrade(type) {
            const cost = getUpgradeCost(type);
            if (state.pc >= cost) {
                state.pc -= cost;
                state.upgrades[type]++;
                if (type === 'dpc') state.dpc += 1;
                if (type === 'dps') state.dps += 2;
                updateUI();
                updateShopUI();
                saveGame();
            }
        }

        // Interfaz
        function updateHPBar() {
            const pct = (currentCreature.currentHp / currentCreature.maxHp) * 100;
            const fill = document.getElementById('hp-fill');
            fill.style.width = `${Math.max(0, pct)}%`;
            fill.style.background = pct > 50 ? '#4cd137' : (pct > 20 ? '#f1c40f' : '#e74c3c');
        }

        function updateUI() {
            const defeatedInCurrent = state.defeatedPerRoute[state.route] || 0;
            document.getElementById('stat-dpc').innerText = state.dpc;
            document.getElementById('stat-dps').innerText = state.dps;
            document.getElementById('stat-pc').innerText = state.pc;
            document.getElementById('stat-caught').innerText = `${state.caughtIds.size}/${allCreatures.length}`;
            document.getElementById('route-name').innerText = `RUTA ${state.route}: ${routes[state.route - 1].name.toUpperCase()}`;
            document.getElementById('route-progress').innerText = `DERROTADOS: ${defeatedInCurrent} / ${state.requiredToAdvance}`;
            document.getElementById('lvl-dpc').innerText = state.upgrades.dpc;
            document.getElementById('lvl-dps').innerText = state.upgrades.dps;
            checkNextRouteButton();
        }

        function updateShopUI() {
            const dpcCost = getUpgradeCost('dpc');
            const dpsCost = getUpgradeCost('dps');
            document.getElementById('shop-dpc-cost').innerText = `Coste: ${dpcCost} PC`;
            document.getElementById('shop-dps-cost').innerText = `Coste: ${dpsCost} PC`;
            document.getElementById('btn-buy-dpc').className = `shop-btn ${state.pc < dpcCost ? 'disabled' : ''}`;
            document.getElementById('btn-buy-dps').className = `shop-btn ${state.pc < dpsCost ? 'disabled' : ''}`;
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            const isOpen = el.style.display === 'flex';
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            if (!isOpen) {
                el.style.display = 'flex';
                if (id === 'bestiary') renderBestiary();
                if (id === 'shop') updateShopUI();
                if (id === 'map') renderRoutes();
            }
        }

        function renderBestiary() {
            const list = document.getElementById('bestiary-list');
            list.innerHTML = '';
            allCreatures.forEach(c => {
                const caught = state.caughtIds.has(c.id);
                const div = document.createElement('div');
                div.className = `bestiary-entry ${caught ? 'caught' : ''}`;
                div.innerHTML = caught ?
                    `<div style="width:30px;height:30px;background:${c.color};border:2px solid #000;margin-bottom:5px"></div>${c.name.toUpperCase()}` :
                    '<div style="font-size:16px">?</div>';
                list.appendChild(div);
            });
        }

        function renderRoutes() {
            const list = document.getElementById('routes-list');
            list.innerHTML = '';
            routes.forEach(r => {
                const isLocked = r.id > state.maxUnlockedRoute;
                const isCurrent = r.id === state.route;
                const div = document.createElement('div');
                div.className = `route-item ${isLocked ? 'locked' : ''} ${isCurrent ? 'current' : ''}`;
                div.onclick = () => changeRoute(r.id);

                const creaturesInRoute = allCreatures.filter(c => c.route === r.id);
                const caughtInRoute = creaturesInRoute.filter(c => state.caughtIds.has(c.id)).length;
                const defeatedInThisRoute = state.defeatedPerRoute[r.id] || 0;

                div.innerHTML = `
                <div style="text-align:left">
                    <div>${r.id}. ${r.name.toUpperCase()}</div>
                    <div style="font-size:7px; color:#666; margin-top:3px">AVANCE: ${defeatedInThisRoute}/${state.requiredToAdvance}</div>
                </div>
                <div style="text-align:right">
                    <div>${isLocked ? 'BLOQUEADO' : caughtInRoute + '/' + creaturesInRoute.length}</div>
                    <div style="font-size:7px; color:#d35400; margin-top:3px">+${r.id} PC/Derrota</div>
                </div>
            `;
                list.appendChild(div);
            });
        }

        function showNotification(text) {
            const el = document.getElementById('game-notification');
            el.innerText = text;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1800);
        }

        function showFloatingText(x, y, text, color) {
            const span = document.createElement('span');
            span.className = 'floating-text';
            span.innerText = text;
            span.style.color = color;
            span.style.left = `${x}px`;
            span.style.top = `${y}px`;
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 600);
        }

        // Loop de Daño Automático
        setInterval(() => dealDamage(null, 'auto'), 1000);

        window.onload = () => {
            loadGame();
            updateUI();
            spawnCreature();
        };
    </script>

</body>

</html>
