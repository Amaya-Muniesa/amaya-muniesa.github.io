
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Cubil del Coleccionista - Gestión Total</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animación suave para filas nuevas */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-row { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAQxKP_A8vUcPwngb260dKyhRXTW4NSRkU",
          authDomain: "el-cubil-2026.firebaseapp.com",
          projectId: "el-cubil-2026",
          storageBucket: "el-cubil-2026.firebasestorage.app",
          messagingSenderId: "292186283894",
          appId: "1:292186283894:web:d80f224d742cf8b720e457"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "el-cubil-2026";

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [errorMessage, setErrorMessage] = useState(null);
            
            const [concept, setConcept] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('Efectivo (Tienda)');
            const [category, setCategory] = useState('Venta'); 
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const loginWithGoogle = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                setErrorMessage(null);
                try {
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.error(error);
                    if (error.code === 'auth/unauthorized-domain') {
                        setErrorMessage(`Dominio no autorizado. Amaya, dile a Sebastian que añada "${window.location.hostname}" a dominios autorizados.`);
                    } else {
                        setErrorMessage("Error al acceder: " + error.message);
                    }
                }
            };

            const logout = () => auth.signOut();

            // Sincronización en tiempo real con Firestore
            useEffect(() => {
                if (!user) {
                    setEntries([]);
                    return;
                }

                setLoading(true);
                const collectionRef = db.collection('artifacts')
                    .doc(appId)
                    .collection('users')
                    .doc(user.uid)
                    .collection('ventas');

                const unsubscribe = collectionRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ 
                        firestoreId: doc.id, 
                        ...doc.data() 
                    }));
                    // Ordenar por fecha y luego por timestamp
                    const sorted = data.sort((a, b) => {
                        if (b.date !== a.date) return b.date.localeCompare(a.date);
                        return (b.timestamp || 0) - (a.timestamp || 0);
                    });
                    setEntries(sorted);
                    setLoading(false);
                    // Reinicializar iconos de Lucide
                    setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
                }, (error) => {
                    console.error("Error Firestore:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const totals = useMemo(() => {
                return entries.reduce((acc, item) => {
                    const value = parseFloat(item.amount) || 0;
                    if (item.category === 'Venta') {
                        const beneficioNeto = value * 0.2;
                        acc.totalIngresos += beneficioNeto;
                        if (item.type === 'Efectivo (Tienda)') acc.efectivoIngresos += beneficioNeto;
                        else acc.onlineIngresos += beneficioNeto;
                    } else {
                        acc.totalIngresos -= value;
                        if (item.type === 'Efectivo (Tienda)') acc.efectivoIngresos -= value;
                        else acc.onlineIngresos -= value;
                    }
                    return acc;
                }, { totalIngresos: 0, efectivoIngresos: 0, onlineIngresos: 0 });
            }, [entries]);

            const monthlyStats = useMemo(() => {
                const months = {};
                entries.forEach(entry => {
                    const month = entry.date ? entry.date.substring(0, 7) : 'Sin fecha'; 
                    if (!months[month]) months[month] = { ventas: 0, compras: 0 };
                    if (entry.category === 'Venta') months[month].ventas += (entry.amount || 0);
                    else months[month].compras += (entry.amount || 0);
                });
                return Object.entries(months).sort().reverse();
            }, [entries]);

            const addEntry = async (e) => {
                e.preventDefault();
                if (!concept || !amount || !user) return;
                
                const newEntry = {
                    timestamp: Date.now(),
                    date, 
                    concept,
                    amount: parseFloat(amount),
                    type, 
                    category,
                    impactoCaja: category === 'Venta' ? parseFloat(amount) * 0.2 : -parseFloat(amount)
                };

                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('ventas').add(newEntry);
                    setConcept(''); 
                    setAmount('');
                    setErrorMessage(null);
                } catch (err) {
                    setErrorMessage("Error al guardar: " + err.message);
                }
            };

            const deleteEntry = async (id) => {
                // He añadido una confirmación para evitar desastres accidentales, Amaya
                if(confirm('¿Estás segura de querer eliminar este registro permanentemente?')) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('ventas').doc(id).delete();
                    } catch (err) {
                        setErrorMessage("Error al borrar el registro");
                    }
                }
            };

            if (loading && !user) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
                        <p className="mt-4 text-slate-400 font-medium">Consultando el inventario...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-slate-100">
                        <h1 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">El Cubil</h1>
                        <p className="text-slate-500 mb-8 font-medium">Acceso restringido para coleccionistas autorizados.</p>
                        
                        {errorMessage && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-xs font-semibold">
                                {errorMessage}
                            </div>
                        )}

                        <button 
                            onClick={loginWithGoogle}
                            className="w-full flex items-center justify-center gap-4 bg-slate-900 py-4 rounded-2xl font-bold text-white hover:bg-slate-800 transition-all shadow-xl active:scale-95"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="currentColor" d="M12.48 10.92v3.28h7.84c-.24 1.84-.9 3.34-2 4.47-1.1 1.1-2.75 2.14-5.84 2.14-5.22 0-9.41-4.23-9.41-9.41s4.19-9.41 9.41-9.41c2.84 0 4.92 1.09 6.45 2.54l2.25-2.25C18.84 1.8 15.89 0 12.06 0 5.4 0 0 5.4 0 12s5.4 12 12.06 12c3.63 0 6.36-1.2 8.52-3.45 2.22-2.22 2.92-5.34 2.92-7.8 0-.54-.05-1.05-.14-1.53H12.48z"/>
                            </svg>
                            Entrar con Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10 bg-slate-50">
                    <div className="max-w-7xl mx-auto">
                        {/* Header con estilo mejorado */}
                        <header className="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div className="flex items-center gap-5">
                                <div className="relative">
                                    <img src={user.photoURL} className="w-16 h-16 rounded-2xl border-4 border-white shadow-md" alt="avatar" />
                                    <div className="absolute -bottom-1 -right-1 w-5 h-5 bg-emerald-500 border-4 border-white rounded-full"></div>
                                </div>
                                <div>
                                    <h1 className="text-4xl font-black text-slate-900 tracking-tighter">El Cubil</h1>
                                    <p className="text-slate-500 font-medium flex items-center gap-2">
                                        Administrador: <span className="text-indigo-600">{user.displayName}</span>
                                        <button onClick={logout} className="ml-2 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="bg-white px-8 py-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-end min-w-[240px]">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Caja Neta Actual</span>
                                <div className={`text-3xl font-black tabular-nums ${totals.totalIngresos >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                    {totals.totalIngresos.toLocaleString('es-ES', { minimumFractionDigits: 2 })}€
                                </div>
                            </div>
                        </header>

                        {errorMessage && (
                            <div className="mb-8 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-r-xl text-sm flex justify-between items-center animate-row">
                                <div className="flex items-center gap-3">
                                    <i data-lucide="alert-circle"></i>
                                    {errorMessage}
                                </div>
                                <button onClick={() => setErrorMessage(null)} className="hover:scale-110 transition-transform">✕</button>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 group hover:shadow-md transition-shadow">
                                <div className="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 mb-4 group-hover:scale-110 transition-transform"><i data-lucide="pie-chart"></i></div>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Beneficio Total</p>
                                <p className="text-3xl font-black text-slate-800 tabular-nums">{totals.totalIngresos.toFixed(2)}€</p>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 group hover:shadow-md transition-shadow">
                                <div className="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 mb-4 group-hover:scale-110 transition-transform"><i data-lucide="banknote"></i></div>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Físico (Tienda)</p>
                                <p className="text-3xl font-black text-slate-800 tabular-nums">{totals.efectivoIngresos.toFixed(2)}€</p>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 group hover:shadow-md transition-shadow">
                                <div className="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mb-4 group-hover:scale-110 transition-transform"><i data-lucide="shopping-cart"></i></div>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Canales Online</p>
                                <p className="text-3xl font-black text-slate-800 tabular-nums">{totals.onlineIngresos.toFixed(2)}€</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            {/* Panel Izquierdo: Formulario */}
                            <div className="lg:col-span-4 space-y-8">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-lg border border-slate-100 sticky top-10">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-3 text-slate-800">
                                        <div className="p-2 bg-indigo-600 rounded-lg text-white"><i data-lucide="plus" className="w-5 h-5"></i></div>
                                        Registrar Operación
                                    </h2>
                                    <form onSubmit={addEntry} className="space-y-5">
                                        <div className="flex p-1.5 bg-slate-100 rounded-2xl">
                                            <button type="button" onClick={() => setCategory('Venta')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${category === 'Venta' ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`}>VENTA (20%)</button>
                                            <button type="button" onClick={() => setCategory('Compra')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${category === 'Compra' ? 'bg-white shadow-sm text-red-600' : 'text-slate-400 hover:text-slate-600'}`}>GASTO (100%)</button>
                                        </div>
                                        
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Fecha</label>
                                            <input type="date" className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium" value={date} onChange={e => setDate(e.target.value)} />
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Concepto</label>
                                            <input type="text" placeholder="¿Qué se ha movido hoy?" className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium" value={concept} onChange={e => setConcept(e.target.value)} />
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Importe (€)</label>
                                                <input type="number" step="0.01" className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-mono font-bold" value={amount} onChange={e => setAmount(e.target.value)} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Canal</label>
                                                <select className="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-xs" value={type} onChange={e => setType(e.target.value)}>
                                                    <option value="Efectivo (Tienda)">Efectivo</option>
                                                    <option value="Venta Online">Online</option>
                                                </select>
                                            </div>
                                        </div>

                                        <button type="submit" className={`w-full py-4 rounded-2xl font-black text-white shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 ${category === 'Venta' ? 'bg-emerald-500 hover:bg-emerald-600 shadow-emerald-200' : 'bg-red-500 hover:bg-red-600 shadow-red-200'}`}>
                                            Confirmar {category}
                                            <i data-lucide="chevron-right" className="w-4 h-4"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>

                            {/* Panel Derecho: Historial */}
                            <div className="lg:col-span-8 space-y-6">
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-8 border-b border-slate-50 flex items-center justify-between">
                                        <h2 className="text-xl font-black text-slate-800">Libro de Cuentas</h2>
                                        <span className="bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-black text-slate-500 uppercase tracking-widest">Registros: {entries.length}</span>
                                    </div>
                                    <div className="overflow-x-auto scrollbar-thin">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em]">
                                                <tr>
                                                    <th className="px-8 py-5">Fecha</th>
                                                    <th className="px-8 py-5">Concepto</th>
                                                    <th className="px-8 py-5 text-right">Bruto</th>
                                                    <th className="px-8 py-5 text-right">Neto</th>
                                                    <th className="px-8 py-5 text-center">Gestión</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {entries.length === 0 ? (
                                                    <tr><td colSpan="5" className="px-8 py-20 text-center text-slate-300 font-medium italic">El historial está en blanco. Empieza a vender.</td></tr>
                                                ) : (
                                                    entries.map(entry => (
                                                        <tr key={entry.firestoreId} className="hover:bg-slate-50 transition-colors animate-row group">
                                                            <td className="px-8 py-5">
                                                                <div className="text-xs font-black text-slate-400 font-mono">{entry.date.split('-').reverse().join('/')}</div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <div className="font-bold text-slate-700">{entry.concept}</div>
                                                                <div className="text-[10px] font-bold text-slate-300 uppercase">{entry.type}</div>
                                                            </td>
                                                            <td className="px-8 py-5 text-right font-mono font-bold text-slate-400">
                                                                {entry.amount.toFixed(2)}€
                                                            </td>
                                                            <td className={`px-8 py-5 text-right font-mono font-black ${entry.impactoCaja >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                                {entry.impactoCaja >= 0 ? '+' : ''}{entry.impactoCaja.toFixed(2)}€
                                                            </td>
                                                            <td className="px-8 py-5 text-center">
                                                                {/* Botón de borrar: ahora con un color rojo sutil pero claro al pasar el ratón */}
                                                                <button 
                                                                    onClick={() => deleteEntry(entry.firestoreId)}
                                                                    className="p-2.5 rounded-xl text-slate-200 hover:text-red-600 hover:bg-red-50 transition-all active:scale-90"
                                                                    title="Eliminar permanentemente"
                                                                >
                                                                    <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
