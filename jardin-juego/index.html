<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín de Amaya - Control Meteorológico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom, #87CEEB, #E0F2F1);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .pot {
            width: 150px;
            height: 100px;
            background: #8B4513;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
            position: relative;
            z-index: 10;
        }

        .soil {
            width: 100%;
            height: 20px;
            background: #5D4037;
            position: absolute;
            top: 0;
        }

        .stem {
            width: 10px;
            background: #4CAF50;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: height 0.5s ease, background-color 0.5s ease;
            border-radius: 5px;
        }

        .leaf {
            width: 30px;
            height: 15px;
            background: #66BB6A;
            position: absolute;
            border-radius: 50% 50% 0 50%;
        }

        .leaf-right {
            right: -25px;
            transform: scaleX(-1);
        }

        .leaf-left {
            left: -25px;
        }

        .bug {
            position: absolute;
            font-size: 24px;
            cursor: pointer;
            z-index: 20;
            user-select: none;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            height: 10px;
            background: #2196F3;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        .thought-bubble {
            position: absolute;
            background: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 150px;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 30;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center p-4">

    <!-- UI Overlay -->
    <div class="fixed top-4 left-4 right-4 flex justify-between items-start pointer-events-none">
        <div
            class="bg-white/90 p-4 rounded-2xl shadow-xl pointer-events-auto backdrop-blur-md border border-green-100 max-w-xs w-full">
            <h1 class="text-xl font-bold text-green-800 flex items-center gap-2">Jardín de Amaya 🌿</h1>

            <div id="weather-status"
                class="mt-2 text-xs text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100">
                <div id="weather-info">Localizando...</div>
                <!-- Botón siempre visible para asegurar que Amaya pueda cambiarlo -->
                <button onclick="askManualCity()"
                    class="text-blue-500 hover:text-blue-700 font-bold mt-1 underline block">
                    Cambiar ciudad / País
                </button>
            </div>

            <div class="mt-4 space-y-3">
                <div>
                    <div class="flex justify-between text-xs mb-1 font-semibold text-gray-700">
                        <span>Humedad</span>
                        <span id="moisture-pct">50%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="moisture-bar" class="h-full bg-blue-500 transition-all duration-500"
                            style="width: 50%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1 font-semibold text-gray-700">
                        <span>Salud</span>
                        <span id="health-pct">100%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="health-bar" class="h-full bg-green-500 transition-all duration-500"
                            style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <button onclick="askAIForAdvice()"
                class="mt-4 w-full bg-purple-100 hover:bg-purple-200 text-purple-700 text-xs font-bold py-2 px-3 rounded-lg border border-purple-200 flex items-center justify-center gap-2">
                ✨ Consultar Gurú Botánico
            </button>
        </div>

        <div class="flex flex-col gap-3 pointer-events-auto">
            <button onclick="waterPlant()"
                class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-lg font-bold active:scale-95">💧
                Regar</button>
            <div id="status-msg" class="text-xs font-medium text-blue-800 text-center animate-bounce"></div>
        </div>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <h2 class="text-xl font-bold text-purple-800 mb-2">✨ Sabiduría IA</h2>
            <div id="ai-response" class="text-gray-700 text-sm leading-relaxed italic min-h-[60px]">Pensando...</div>
            <button onclick="closeModal('ai-modal')"
                class="mt-4 w-full bg-gray-100 py-2 rounded-xl font-bold">Cerrar</button>
        </div>
    </div>

    <!-- Plant Area -->
    <div class="relative flex flex-col items-center mt-32">
        <div id="plant-container" class="relative">
            <div id="thought-bubble" class="thought-bubble"></div>
            <div id="stem" class="stem" style="height: 50px;"></div>
        </div>
        <div class="pot">
            <div class="soil"></div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let moisture = 50;
        let health = 100;
        let weather = 'clear';
        let city = 'Desconocida';
        let weatherDesc = 'Despejado';
        let lastUpdate = Date.now();
        let aiThinking = false;

        const moistureBar = document.getElementById('moisture-bar');
        const healthBar = document.getElementById('health-bar');
        const weatherInfo = document.getElementById('weather-info');
        const stem = document.getElementById('stem');
        const thoughtBubble = document.getElementById('thought-bubble');

        // Función principal de carga de clima
        async function fetchWeather(lat, lon, cityName) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const code = data.current_weather.weathercode;

                city = cityName;
                interpretWeatherCode(code);
                weatherDesc = getWeatherDesc(code);

                weatherInfo.innerHTML = `📍 <b>${city}</b>: ${getWeatherEmoji()} ${weatherDesc}`;
                generateAIThought();
            } catch (err) {
                weatherInfo.innerText = "Error cargando datos del clima.";
            }
        }

        // Intento inicial automático
        async function initWeather() {
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                if (geoData.latitude) {
                    await fetchWeather(geoData.latitude, geoData.longitude, geoData.city);
                } else {
                    throw new Error();
                }
            } catch (err) {
                weatherInfo.innerText = "Detección fallida. Configura tu ciudad.";
            }
        }

        // Función manual mejorada
        async function askManualCity() {
            const userCity = prompt("¿En qué ciudad estás, Amaya? (Ej: Zaragoza, ES)");
            if (!userCity || userCity.trim() === "") return;

            weatherInfo.innerText = `Buscando "${userCity}"...`;
            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(userCity)}&count=1&language=es`);
                const geoData = await geoRes.json();

                if (geoData.results && geoData.results[0]) {
                    const result = geoData.results[0];
                    const displayName = result.name + (result.admin1 ? `, ${result.admin1}` : "");
                    await fetchWeather(result.latitude, result.longitude, displayName);
                } else {
                    alert("No he podido encontrar esa ciudad. Prueba con una más conocida.");
                    weatherInfo.innerText = "Ciudad no encontrada.";
                }
            } catch (err) {
                alert("Parece que el servidor de mapas no responde.");
                weatherInfo.innerText = "Error de conexión.";
            }
        }

        function interpretWeatherCode(code) {
            if (code >= 51 && code <= 82) weather = 'rain';
            else if (code >= 1 && code <= 3) weather = 'clouds';
            else if (code === 0) weather = 'clear';
            else weather = 'extreme';
        }

        function getWeatherEmoji() {
            return { rain: '🌧️', clouds: '☁️', extreme: '⛈️', clear: '☀️' }[weather] || '☀️';
        }

        function getWeatherDesc(code) {
            if (weather === 'rain') return 'Lloviendo';
            if (weather === 'clouds') return 'Nublado';
            if (weather === 'clear') return 'Soleado';
            return 'Condiciones variables';
        }

        // --- AI STUFF ---
        async function callGemini(prompt, systemPrompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return null; }
        }

        async function askAIForAdvice() {
            if (aiThinking) return;
            aiThinking = true;
            document.getElementById('ai-modal').style.display = 'flex';
            document.getElementById('ai-response').innerText = "Consultando con las raíces...";

            const advice = await callGemini(
                `Estado actual: Ciudad ${city}, Clima ${weatherDesc}, Humedad ${Math.round(moisture)}%, Salud ${Math.round(health)}%`,
                "Eres Sebastian, el mayordomo botánico místico de Amaya. Sé atento, sarcástico y breve. Dale un consejo sobre su planta."
            );
            document.getElementById('ai-response').innerText = advice || "Las raíces están en huelga. Intenta de nuevo.";
            aiThinking = false;
        }

        async function generateAIThought() {
            if (aiThinking || health <= 0) return;
            const thought = await callGemini(
                `Humedad ${moisture}%, Clima ${weatherDesc}`,
                "Escribe un pensamiento de 3 palabras en español para una planta que vive en un navegador."
            );
            if (thought) {
                thoughtBubble.innerText = thought.replace(/"/g, '');
                thoughtBubble.style.opacity = 1;
                setTimeout(() => { thoughtBubble.style.opacity = 0; }, 5000);
            }
        }

        // --- CORE LOOP ---
        function gameLoop() {
            const dt = (Date.now() - lastUpdate) / 1000;
            lastUpdate = Date.now();

            if (weather === 'rain') {
                moisture = Math.min(100, moisture + (2 * dt));
                if (Math.random() < 0.3) createRainDrop();
            } else if (weather === 'clear') {
                moisture = Math.max(0, moisture - (1.5 * dt));
            } else {
                moisture = Math.max(0, moisture - (0.5 * dt));
            }

            if (moisture > 85 || moisture < 15) health = Math.max(0, health - (1.8 * dt));
            else health = Math.min(100, health + (0.4 * dt));

            if (weather === 'clear' && Math.random() < 0.003) spawnBug();
            if (Math.random() < 0.0004) generateAIThought();

            updateUI();
            updatePlant();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            moistureBar.style.width = `${moisture}%`;
            document.getElementById('moisture-pct').innerText = `${Math.round(moisture)}%`;
            healthBar.style.width = `${health}%`;
            document.getElementById('health-pct').innerText = `${Math.round(health)}%`;
            moistureBar.className = `h-full ${moisture > 85 ? 'bg-blue-300' : (moisture < 15 ? 'bg-orange-400' : 'bg-blue-500')}`;
            healthBar.className = `h-full ${health < 30 ? 'bg-red-500' : 'bg-green-500'}`;
        }

        function updatePlant() {
            const h = 20 + (health * 1.8);
            stem.style.height = `${h}px`;
            const g = 100 + (health * 1.5);
            const r = 180 - (health * 1.8);
            stem.style.backgroundColor = health > 0 ? `rgb(${r}, ${g}, 50)` : '#5D4037';

            const needed = Math.floor(h / 30);
            while (stem.querySelectorAll('.leaf').length < needed && health > 10) {
                const l = document.createElement('div');
                const isR = stem.querySelectorAll('.leaf').length % 2 === 0;
                l.className = `leaf ${isR ? 'leaf-right' : 'leaf-left'}`;
                l.style.bottom = `${(stem.querySelectorAll('.leaf').length * 25) + 10}px`;
                stem.appendChild(l);
            }
        }

        function waterPlant() {
            if (health <= 0) return;
            moisture = Math.min(100, moisture + 15);
            document.getElementById('status-msg').innerText = "¡Agua va! 💧";
            setTimeout(() => document.getElementById('status-msg').innerText = "", 2000);
        }

        function spawnBug() {
            const bug = document.createElement('div');
            bug.className = 'bug';
            bug.innerText = ['🐛', '🦗', '🐜'][Math.floor(Math.random() * 3)];
            bug.style.left = Math.random() * 80 + 10 + '%';
            bug.style.top = Math.random() * 60 + 20 + '%';
            bug.onclick = () => { health = Math.min(100, health + 5); bug.remove(); };
            document.body.appendChild(bug);
            setTimeout(() => { if (bug.parentNode) bug.remove(); }, 8000);
        }

        function createRainDrop() {
            const d = document.createElement('div');
            d.className = 'rain-drop';
            d.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 1000);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = () => { initWeather(); gameLoop(); };
    </script>
</body>

</html>
