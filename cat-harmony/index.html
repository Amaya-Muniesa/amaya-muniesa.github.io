<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatitos Musicales - Cat Harmony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        
        body {
            font-family: 'Fredoka One', cursive;
            background-color: #fef2f2;
            overflow-x: hidden;
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            transition: all 0.2s ease;
        }

        .grid-cell.active-step {
            background-color: #fce7f3;
            border-color: #ec4899;
            box-shadow: inset 0 0 15px rgba(236, 72, 153, 0.2);
        }

        .cat-note {
            cursor: grab;
            animation: bounce 0.5s infinite alternate ease-in-out;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .playing {
            animation: pulse-note 0.2s ease-out !important;
        }

        @keyframes pulse-note {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .speed-badge {
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 4px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-4xl text-pink-600 mb-2">🐾 Cat Harmony 🐾</h1>
            <p class="text-pink-400">Diseña tu propia sinfonía, Amaya</p>
        </header>

        <div class="flex flex-col md:flex-row gap-8">
            <!-- Sidebar -->
            <div class="w-full md:w-1/4 bg-white p-6 rounded-3xl shadow-xl border-4 border-pink-200">
                <h2 class="text-lg text-pink-500 mb-4 text-center">Notas Gatunas</h2>
                <div class="grid grid-cols-2 gap-3" id="cat-palette"></div>
                
                <div class="mt-8">
                    <h2 class="text-lg text-pink-500 mb-2 text-center">Controles</h2>
                    <div class="space-y-2">
                        <button id="play-stop" class="w-full py-2 bg-pink-500 text-white rounded-xl hover:bg-pink-600 transition-colors shadow-sm">Play / Pausa</button>
                        <button id="clear-board" class="w-full py-2 bg-gray-200 text-gray-600 rounded-xl hover:bg-gray-300 transition-colors">Limpiar Todo</button>
                    </div>
                </div>

                <div class="mt-6 pt-6 border-t border-pink-100">
                    <h2 class="text-lg text-pink-500 mb-2 text-center">Análisis Musical</h2>
                    <div class="space-y-2">
                        <button id="ai-analyze" class="w-full py-2 bg-indigo-500 text-white rounded-xl shadow-md hover:bg-indigo-600 transition-all flex items-center justify-center gap-2">
                            <span>✨ Analizar Obra</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tablero -->
            <div class="flex-1 space-y-4">
                <div class="bg-white p-4 rounded-3xl shadow-2xl border-4 border-pink-300 relative">
                    <div class="grid grid-cols-4 gap-4" id="game-board"></div>
                </div>
                
                <div id="ai-status" class="hidden bg-white p-4 rounded-2xl border-2 border-indigo-200 text-indigo-700 italic shadow-inner">
                    <div id="ai-message">Consultando al jurado felino...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Inicio -->
    <div id="audio-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl text-center shadow-2xl">
            <h3 class="text-2xl text-pink-600 mb-4">¿Lista para componer?</h3>
            <button id="start-btn" class="px-8 py-3 bg-pink-500 text-white rounded-full text-xl hover:bg-pink-600 transition-all">¡Miau! (Entrar)</button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cat-harmony-sequencer';

        const notes = [
            { id: 'C', color: '#ffadad', name: 'DO', freq: 261.63 },
            { id: 'D', color: '#ffd6a5', name: 'RE', freq: 293.66 },
            { id: 'E', color: '#fdffb6', name: 'MI', freq: 329.63 },
            { id: 'F', color: '#caffbf', name: 'FA', freq: 349.23 },
            { id: 'G', color: '#9bf6ff', name: 'SOL', freq: 392.00 },
            { id: 'A', color: '#a0c4ff', name: 'LA', freq: 440.00 },
            { id: 'B', color: '#bdb2ff', name: 'SI', freq: 493.88 },
            { id: 'SILENCE', color: '#d1d5db', name: 'SHH', freq: 0, isSilence: true }
        ];

        const speeds = [
            { id: 'white', label: 'Blanca', ms: 1200 },
            { id: 'black', label: 'Negra', ms: 600 },
            { id: 'quaver', label: 'Corchea', ms: 300 }
        ];

        let selectedNote = null;
        let audioCtx = null;
        let boardState = Array(16).fill(null);
        let currentStep = -1;
        let isPlaying = false;
        let timeoutId = null;

        // --- MOTOR DE AUDIO ---
        const playFreq = (freq) => {
            if (!audioCtx || audioCtx.state !== 'running' || freq === 0) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        };

        // --- SECUENCIADOR ---
        function nextStep() {
            if (!isPlaying) return;

            // Limpiar visual anterior
            if (currentStep >= 0) {
                const prevCell = document.querySelector(`[data-index="${currentStep}"]`);
                if (prevCell) prevCell.classList.remove('active-step');
            }

            // Avanzar paso
            currentStep = (currentStep + 1) % 16;
            const cell = document.querySelector(`[data-index="${currentStep}"]`);
            cell.classList.add('active-step');

            const data = boardState[currentStep];
            let waitTime = 600; 

            if (data) {
                waitTime = speeds[data.speedIndex].ms;
                if (!data.isSilence) {
                    playFreq(data.freq);
                    const catSvg = cell.querySelector('.cat-note');
                    if (catSvg) {
                        catSvg.classList.add('playing');
                        setTimeout(() => catSvg.classList.remove('playing'), 200);
                    }
                }
            }

            timeoutId = setTimeout(nextStep, waitTime);
        }

        function resetSequencer() {
            clearTimeout(timeoutId);
            if (currentStep >= 0) {
                const activeCell = document.querySelector(`[data-index="${currentStep}"]`);
                if (activeCell) activeCell.classList.remove('active-step');
            }
            currentStep = -1; // Reiniciar para que el siguiente paso sea el 0
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-stop');
            if (isPlaying) {
                btn.innerText = "Detener Sinfonía";
                btn.classList.replace('bg-pink-500', 'bg-red-400');
                nextStep();
            } else {
                btn.innerText = "Play / Pausa";
                btn.classList.replace('bg-red-400', 'bg-pink-500');
                resetSequencer();
            }
        }

        // --- UI ---
        const palette = document.getElementById('cat-palette');
        notes.forEach(note => {
            const btn = document.createElement('button');
            btn.className = 'flex flex-col items-center p-2 rounded-xl border-2 border-transparent hover:bg-pink-50 transition-all';
            btn.innerHTML = `
                <svg viewBox="0 0 100 100" class="w-10 h-10" style="fill: ${note.color}">
                    <circle cx="50" cy="55" r="35" />
                    <path d="M25 35 L15 10 L40 25 Z" />
                    <path d="M75 35 L85 10 L60 25 Z" />
                    ${note.isSilence ? '<path d="M35 55 L65 55" stroke="#333" stroke-width="5"/>' : '<circle cx="40" cy="50" r="3" fill="#333" /><circle cx="60" cy="50" r="3" fill="#333" />'}
                </svg>
                <span class="text-[10px] mt-1">${note.name}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('#cat-palette button').forEach(b => b.classList.remove('border-pink-400', 'bg-pink-50'));
                btn.classList.add('border-pink-400', 'bg-pink-50');
                selectedNote = note;
            };
            palette.appendChild(btn);
        });

        const board = document.getElementById('game-board');
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell bg-pink-50 rounded-2xl border-2 border-dashed border-pink-200 flex items-center justify-center relative cursor-pointer';
            cell.dataset.index = i;
            cell.onclick = () => {
                if (boardState[i]) {
                    boardState[i].speedIndex = (boardState[i].speedIndex + 1) % speeds.length;
                } else if (selectedNote) {
                    boardState[i] = { ...selectedNote, speedIndex: 1 };
                } else {
                    boardState[i] = null;
                }
                renderCell(i);
            };
            board.appendChild(cell);
        }

        function renderCell(i) {
            const cell = board.children[i];
            const data = boardState[i];
            if (!data) { cell.innerHTML = ''; return; }
            cell.innerHTML = `
                <div class="cat-note flex flex-col items-center">
                    <svg viewBox="0 0 100 100" class="w-14 h-14" style="fill: ${data.color}">
                        <circle cx="50" cy="55" r="35" />
                        <path d="M25 35 L15 10 L40 25 Z" />
                        <path d="M75 35 L85 10 L60 25 Z" />
                        ${data.isSilence ? '<path d="M35 55 L65 55" stroke="#333" stroke-width="5"/>' : '<circle cx="40" cy="50" r="3" fill="#333" /><circle cx="60" cy="50" r="3" fill="#333" />'}
                    </svg>
                    <span class="speed-badge bg-white border absolute top-1 right-1">${data.speedIndex === 0 ? 'B' : data.speedIndex === 1 ? 'N' : 'C'}</span>
                </div>`;
        }

        // --- IA ANALIZAR ---
        async function fetchGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Eres un gato experto en crítica musical. Eres un poco sarcástico pero divertido." }] }
            };
            const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            return result.candidates[0].content.parts[0].text;
        }

        document.getElementById('ai-analyze').onclick = async () => {
            const msg = document.getElementById('ai-message');
            document.getElementById('ai-status').classList.remove('hidden');
            msg.innerHTML = '<span class="loader mr-2"></span> Aguzando el oído...';
            try {
                const desc = boardState.map((n, idx) => n ? `${idx}:${n.name}(${speeds[n.speedIndex].label})` : '').filter(x => x).join(", ");
                const res = await fetchGemini(`Analiza esta secuencia: ${desc}. Sé breve y divertido.`);
                msg.innerText = "😺 " + res;
            } catch (e) { msg.innerText = "Miau... algo ha fallado en la conexión."; }
        };

        // --- EVENTOS ---
        document.getElementById('start-btn').onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('audio-modal').classList.add('hidden');
        };
        document.getElementById('play-stop').onclick = togglePlay;
        document.getElementById('clear-board').onclick = () => {
            isPlaying = false;
            document.getElementById('play-stop').innerText = "Play / Pausa";
            document.getElementById('play-stop').classList.replace('bg-red-400', 'bg-pink-500');
            resetSequencer();
            boardState.fill(null);
            for(let i=0; i<16; i++) renderCell(i);
        };
    </script>
</body>
</html>
