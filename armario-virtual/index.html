<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Armario - Sebastian Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .header {
            padding: 18px;
            font-family: "Limelight", sans-serif;
            text-align: center;
        }

        /* El truco para el recorte automático de tus capturas */
        .card-img-container {
            height: 250px;
            overflow: hidden;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-top {
            width: 130%;
            /* Zoom para eliminar bordes laterales */
            height: 160%;
            /* Zoom para eliminar menús superior/inferior */
            object-fit: cover;
            object-position: center 30%;
            /* Enfoca la parte superior-media donde suele estar la prenda */
        }

        .card {
            border-radius: 10px;
            transition: transform .15s;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .card:hover {
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <div class="header">
            <h2>Mi Armario</h2>
        </div>

        <div class="card p-4 mb-4">
            <div class="row g-2">
                <div class="col-md-3"><input type="file" id="fileInput" class="form-control"></div>
                <div class="col-md-3">
                    <select id="catInput" class="form-select">
                        <option>Parte de Arriba</option>
                        <option>Pantalón</option>
                        <option>Vestido</option>
                        <option>Zapatos</option>
                    </select>
                </div>
                <div class="col-md-3"><input type="text" id="subInput" class="form-control" placeholder="Subcategoría">
                </div>
                <div class="col-md-2">
                    <select id="tiempoInput" class="form-select">
                        <option>Calor</option>
                        <option>Frío</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button onclick="subirPrenda()" class="btn btn-dark w-100"><i class="fa fa-plus"></i></button>
                </div>
            </div>
        </div>

        <div class="row" id="galeria"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV1AFWdOKHYpy6ruNWnUuQBYQETJeVKag",
            authDomain: "armario-virtual-cbb44.firebaseapp.com",
            projectId: "armario-virtual-cbb44",
            storageBucket: "armario-virtual-cbb44.firebasestorage.app",
            appId: "1:248808343836:web:10fdf22ed5dab93e3b92d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Función para subir a Firebase
        window.subirPrenda = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Amaya, olvidas la foto.");

            const storageRef = ref(storage, 'armario/' + Date.now() + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);

            await addDoc(collection(db, "prendas"), {
                imagen: url,
                categoria: document.getElementById('catInput').value,
                subcategoria: document.getElementById('subInput').value,
                tiempo: document.getElementById('tiempoInput').value,
                fecha: Date.now()
            });
            alert("Prenda guardada, impecable.");
        };

        // Escuchar cambios en tiempo real
        onSnapshot(collection(db, "prendas"), (snapshot) => {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';
            snapshot.forEach((doc) => {
                const p = doc.data();
                galeria.innerHTML += `
                <div class="col-lg-3 col-md-4 col-6 mb-3">
                    <div class="card">
                        <div class="card-img-container">
                            <img src="${p.imagen}" class="card-img-top">
                        </div>
                        <div class="card-body text-center">
                            <b>${p.categoria}</b><br>
                            <small>${p.subcategoria} (${p.tiempo})</small>
                        </div>
                    </div>
                </div>`;
            });
        });
    </script>
</body>

</html>
