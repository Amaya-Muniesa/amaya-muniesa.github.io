<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Armario - Sebastian Edition</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .header {
            padding: 18px;
            font-family: "Limelight", sans-serif;
            text-align: center;
        }

        .header h2 img {
            height: 50px;
            margin-right: 10px;
        }

        /* Contenedor de recorte para las capturas */
        .img-container {
            width: 100%;
            height: 250px;
            /* Ajusta según prefieras ver más o menos prenda */
            overflow: hidden;
            /* Aquí sucede la magia del recorte */
            background: white;
            display: flex;
            justify-content: center;
        }

        .img-container img {
            width: 100%;
            height: auto;
            object-fit: cover;
            object-position: center 15%;
            /* Desplaza la imagen para ocultar el "Detalles de Prenda" de arriba */
            transform: scale(1.4);
            /* Zoom para eliminar los bordes laterales de la captura original */
        }

        .card {
            border-radius: 10px;
            overflow: hidden;
            transition: transform .15s;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card-body {
            text-align: center;
            font-size: 14px;
            background: white;
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <div class="header">
            <h2 class="mb-4"><img src="logo-mi-armario.png" alt=""> Mi Armario</h2>
        </div>

        <div class="card p-3 mb-4 shadow-sm">
            <form id="formPrenda">
                <div class="row g-2">
                    <div class="col-md-3 col-12">
                        <input type="file" id="imagen" class="form-control" accept="image/*" required>
                    </div>
                    <div class="col-md-3 col-6">
                        <select id="categoria" class="form-select">
                            <option>Parte de Arriba</option>
                            <option>Prenda Exterior</option>
                            <option>Vestido</option>
                            <option>Pantalón</option>
                            <option>Falda</option>
                            <option>Zapatos</option>
                            <option>Bolsos</option>
                            <option>Otros</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-6">
                        <input type="text" id="subcategoria" class="form-control"
                            placeholder="Ej: Camiseta de tirantes">
                    </div>
                    <div class="col-md-2 col-6">
                        <select id="tiempo" class="form-select">
                            <option>Calor</option>
                            <option>Templado</option>
                            <option>Frío</option>
                        </select>
                    </div>
                    <div class="col-md-1 col-6 d-grid">
                        <button type="submit" class="btn btn-dark" id="btnSubir">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>
                </div>
            </form>
            <div id="status" class="small mt-2 text-muted"></div>
        </div>

        <div class="row" id="galeria">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV1AFWdOKHYpy6ruNWnUuQBYQETJeVKag",
            authDomain: "armario-virtual-cbb44.firebaseapp.com",
            projectId: "armario-virtual-cbb44",
            storageBucket: "armario-virtual-cbb44.firebasestorage.app",
            messagingSenderId: "248808343836",
            appId: "1:248808343836:web:10fdf22ed5dab93e3b92d9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const form = document.getElementById('formPrenda');
        const galeria = document.getElementById('galeria');
        const status = document.getElementById('status');

        // SUBIR PRENDA
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('imagen').files[0];
            const btn = document.getElementById('btnSubir');

            if (!file) return;

            btn.disabled = true;
            status.innerText = "Subiendo prenda, Amaya... Un momento.";

            try {
                // 1. Subir imagen a Storage
                const storageRef = ref(storage, 'armario/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                // 2. Guardar datos en Firestore
                await addDoc(collection(db, "prendas"), {
                    imagen: url,
                    categoria: document.getElementById('categoria').value,
                    subcategoria: document.getElementById('subcategoria').value,
                    tiempo: document.getElementById('tiempo').value,
                    fecha: Date.now()
                });

                form.reset();
                status.innerText = "¡Prenda guardada con éxito!";
            } catch (error) {
                console.error(error);
                status.innerText = "Algo ha fallado. Sebastian está en ello...";
            } finally {
                btn.disabled = false;
            }
        });

        // LEER PRENDAS EN TIEMPO REAL
        const q = query(collection(db, "prendas"), orderBy("fecha", "desc"));
        onSnapshot(q, (snapshot) => {
            galeria.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                galeria.innerHTML += `
                <div class="col-lg-3 col-md-4 col-6 mb-4">
                    <div class="card h-100">
                        <div class="img-container">
                            <img src="${p.imagen}">
                        </div>
                        <div class="card-body">
                            <h6 class="mb-1"><b>${p.categoria}</b></h6>
                            <p class="mb-0 text-secondary">${p.subcategoria}</p>
                            <span class="badge bg-light text-dark border">${p.tiempo}</span>
                        </div>
                    </div>
                </div>
            `;
            });
        });
    </script>

</body>

</html>
